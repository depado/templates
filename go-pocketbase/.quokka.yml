name: "Go PocketBase Template"
version: "0.1.0"
description: "Generates a Go project using PocketBase as the backend framework"
delimiters: ["{{", "}}"]
variables:
  name:
    prompt: "Name:"
    help: "Project's name"
    required: true
  owner:
    prompt: "Owner:"
    help: "Organization or username"
    required: true
  gitserver:
    prompt: "Git Server:"
    default: "github.com"
    help: "Git server, used for import path and module declaration"
  description:
    prompt: "Project's description:"
    required: true
    default: "PocketBase backend project"
  docker:
    confirm: true
    prompt: "Add Dockerfile and dockerignore?"
  goreleaser:
    confirm: true
    prompt: "Enable goreleaser?"

includes:
  - source: ../common/license
    confirm: true
    prompt: "Add a LICENSE file?"
  - source: ../common/ci
    confirm: true
    prompt: "Add CI workflow?"
  - source: ../common/renovate
    confirm: true
    prompt: "Add Renovate config?"
  - source: ../common/goreleaser
    if: goreleaser
