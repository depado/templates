name: GoReleaser

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  actions: read

jobs:
  goreleaser:
{{- if .sbom }}
    uses: depado/github-actions/.github/workflows/goreleaser-sbom.yml@main
{{- else }}
    uses: depado/github-actions/.github/workflows/goreleaser.yml@main
{{- end }}
