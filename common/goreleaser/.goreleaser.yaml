---
delimiters: ['<<', '>>']
---
version: 2

project_name: << .name >>

before:
  hooks:
    - go mod tidy
    - go mod verify
    - go vet ./...

gomod:
  proxy: true

builds:
  - id: << .name >>
    binary: << .name >>
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X "<< .gitserver >>/<< .owner >>/<< .name >>/cmd.Version={{ .Version }}"
      - -X "<< .gitserver >>/<< .owner >>/<< .name >>/cmd.Build={{ .Commit }}"
      - -X "<< .gitserver >>/<< .owner >>/<< .name >>/cmd.BuildDate={{ .CommitDate }}"

archives:
  - id: << .name >>
    builds: ["<< .name >>"]
    formats: ["tar.gz"]
    format_overrides:
      - goos: windows
        formats: ["zip"]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

source:
  enabled: true
  name_template: "{{ .ProjectName }}-{{ .Version }}-source"

checksum:
  name_template: 'checksums.txt'

sboms:
  - artifacts: archive
  - id: source
    artifacts: source

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github
  sort: asc
  abbrev: 0
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))?!?:.+$'
      order: 0
    - title: Fixes
      regexp: '^.*?fix(\([[:word:]]+\))?!?:.+$'
      order: 1
    - title: Performance
      regexp: '^.*?perf(\([[:word:]]+\))?!?:.+$'
      order: 2
    - title: Refactors
      regexp: '^.*?refactor(\([[:word:]]+\))?!?:.+$'
      order: 3
    - title: Documentation
      regexp: '^.*?docs(\([[:word:]]+\))?!?:.+$'
      order: 4
    - title: Others
      order: 999
  filters:
    exclude:
      - "^test:"
      - "^chore:"
      - merge conflict
      - Merge pull request

release:
  github:
    owner: << .owner >>
    name: << .name >>
  draft: false
  prerelease: auto
  mode: replace
  name_template: "v{{ .Version }}"

git:
  ignore_tags:
    - nightly

metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"
